<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMON RUN - Official Game</title>
    <style>
        :root {
            --bg-color: #121212;
            --accent-color: #00ff88;
            --text-color: #ffffff;
        }

        body { 
            text-align: center; 
            font-family: 'Courier New', Courier, monospace; 
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container { position: relative; }

        h1 { 
            margin: 0; 
            font-size: 3.5rem; 
            letter-spacing: 8px;
            color: var(--accent-color);
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }

        p { opacity: 0.6; margin-bottom: 20px; font-size: 1.1rem; }

        canvas { 
            background-color: #1e1e1e; 
            display: block; 
            border-radius: 15px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            border: 2px solid #333;
        }

        .score-box {
            position: absolute;
            top: 25px;
            left: 25px;
            font-size: 26px;
            font-weight: bold;
            color: var(--accent-color);
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        kbd {
            background-color: #333;
            padding: 4px 10px;
            border-radius: 5px;
            border: 1px solid #555;
            color: var(--accent-color);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>SIMON RUN</h1>
        <p>TAP <kbd>SPACE</kbd> TO JUMP</p>
        
        <div class="score-box" id="scoreDisplay">SCORE: 0000</div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreDisplay = document.getElementById("scoreDisplay");

        canvas.width = 850;
        canvas.height = 350;

        // --- LOAD GAMBAR SIMON DARI LINK ---
        const mcImg = new Image();
        mcImg.crossOrigin = "anonymous"; 
        mcImg.src = 'https://i.ibb.co/rRfhtkDK/image-1.png'; 

        let score = 0;
        let gameSpeed = 6.5;
        let isGameOver = false;
        let timer = 0;
        let obstacles = [];
        let gameActive = false;
        let rotation = 0; // Untuk efek salto

        const dino = {
            x: 100,
            y: 250,
            width: 85,
            height: 85,
            dy: 0,
            jumpForce: 15,
            gravity: 0.8,
            grounded: false
        };

        window.addEventListener("keydown", (e) => {
            if (e.code === "Space") {
                if (!gameActive || isGameOver) {
                    restartGame();
                } else if (dino.grounded) {
                    dino.dy = -dino.jumpForce;
                    dino.grounded = false;
                }
            }
        });

        function spawnObstacle() {
            let h = Math.random() * (80 - 40) + 40;
            obstacles.push({
                x: canvas.width,
                y: canvas.height - h - 15,
                width: 30,
                height: h,
                color: "#ff3e3e"
            });
        }

        function restartGame() {
            score = 0;
            obstacles = [];
            gameSpeed = 6.5;
            timer = 0;
            dino.y = canvas.height - dino.height - 15;
            dino.dy = 0;
            rotation = 0;
            isGameOver = false;
            gameActive = true;
            update();
        }

        function drawGround() {
            ctx.strokeStyle = "#333";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(0, canvas.height - 15);
            ctx.lineTo(canvas.width, canvas.height - 15);
            ctx.stroke();
        }

        function update() {
            if (isGameOver) {
                ctx.fillStyle = "rgba(0,0,0,0.8)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#00ff88";
                ctx.font = "bold 45px Courier New";
                ctx.textAlign = "center";
                ctx.fillText("SIMON TERJUNGKAL!", canvas.width/2, canvas.height/2 - 20);
                ctx.fillStyle = "white";
                ctx.font = "20px Courier New";
                ctx.fillText("PRESS SPACE TO TRY AGAIN", canvas.width/2, canvas.height/2 + 40);
                ctx.textAlign = "start";
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGround();

            // Fisika & Rotasi
            dino.dy += dino.gravity;
            dino.y += dino.dy;

            if (!dino.grounded) {
                rotation += 0.15; // Efek muter pas lompat
            } else {
                rotation = 0;
            }

            if (dino.y + dino.height > canvas.height - 15) {
                dino.y = canvas.height - dino.height - 15;
                dino.dy = 0;
                dino.grounded = true;
            }

            // Gambar Simon dengan Rotasi
            ctx.save();
            ctx.translate(dino.x + dino.width/2, dino.y + dino.height/2);
            ctx.rotate(rotation);
            ctx.shadowBlur = 20;
            ctx.shadowColor = "rgba(0,0,0,0.5)";
            ctx.drawImage(mcImg, -dino.width/2, -dino.height/2, dino.width, dino.height);
            ctx.restore();

            // Spawn Obstacles
            timer++;
            if (timer % 75 === 0) {
                spawnObstacle();
                if(gameSpeed < 20) gameSpeed += 0.25;
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let o = obstacles[i];
                o.x -= gameSpeed;

                // Render Obstacle (Neon Glow)
                ctx.fillStyle = o.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = o.color;
                ctx.fillRect(o.x, o.y, o.width, o.height);
                ctx.shadowBlur = 0;

                // Deteksi Tabrakan (Hitbox yang lebih presisi)
                if (
                    dino.x + 20 < o.x + o.width &&
                    dino.x + dino.width - 20 > o.x &&
                    dino.y + 20 < o.y + o.height &&
                    dino.y + dino.height > o.y
                ) {
                    isGameOver = true;
                }

                if (o.x + o.width < 0) {
                    obstacles.splice(i, 1);
                    score += 10;
                    scoreDisplay.innerText = "SCORE: " + score.toString().padStart(4, '0');
                }
            }

            requestAnimationFrame(update);
        }

        // Tampilan Awal
        mcImg.onload = () => {
            ctx.fillStyle = "#1e1e1e";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(mcImg, dino.x, canvas.height - dino.height - 15, dino.width, dino.height);
            drawGround();
            ctx.fillStyle = "#00ff88";
            ctx.font = "24px Courier New";
            ctx.textAlign = "center";
            ctx.fillText("READY, SIMON?", canvas.width/2, canvas.height/2);
        };
    </script>
</body>
</html>
