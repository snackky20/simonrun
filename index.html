<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SIMON RUN</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    background:#0f172a;
    display:flex; flex-direction:column; align-items:center;
    justify-content:center; min-height:100vh; min-height:100dvh;
    font-family:'Courier New',monospace; user-select:none;
    -webkit-tap-highlight-color:transparent; overflow:hidden;
}
.wrap { display:flex; flex-direction:column; align-items:center; width:100%; max-width:820px; padding:0 8px; }
.hud { width:100%; display:flex; justify-content:space-between; align-items:center; padding:0 4px 6px; gap:4px; }
.hud-left { display:flex; align-items:center; gap:6px; }
.hi-label { font-size:10px; letter-spacing:2px; color:#94a3b8; font-weight:bold; }
.num { font-size:20px; font-weight:bold; letter-spacing:2px; }
.num.hi  { color:#94a3b8; }
.num.cur { color:#e2e8f0; }
.hearts  { display:flex; gap:3px; }
.heart   { font-size:15px; transition:opacity .2s; }
.heart.lost { opacity:.2; }
canvas { display:block; cursor:pointer; border-radius:12px; box-shadow:0 10px 40px rgba(0,0,0,.5),0 2px 8px rgba(0,0,0,.3); touch-action:none; }
#jumpBtn {
    display:none; margin-top:14px; width:100%; max-width:820px;
    height:72px; background:rgba(255,255,255,0.1);
    border:2px solid rgba(255,255,255,0.2); border-radius:20px;
    color:#e2e8f0; font-family:'Courier New',monospace;
    font-size:20px; font-weight:bold; letter-spacing:4px;
    cursor:pointer; -webkit-tap-highlight-color:transparent;
    touch-action:manipulation; align-items:center; justify-content:center;
}
#jumpBtn:active { background:rgba(255,255,255,0.22); }
#canvasWrap { display:flex; align-items:center; justify-content:center; width:100%; }
@media (hover:none) and (pointer:coarse) { #jumpBtn { display:flex; } }
</style>
</head>
<body>
<div class="wrap">
    <div class="hud" id="hud">
        <div class="hud-left">
            <span class="hi-label">HI</span>
            <span class="num hi" id="hiNum">00000</span>
            <span style="margin-left:8px;font-size:10px;letter-spacing:2px;color:#94a3b8;">LIVES</span>
            <div class="hearts">
                <span class="heart" id="h0">❤️</span>
                <span class="heart" id="h1">❤️</span>
                <span class="heart" id="h2">❤️</span>
            </div>
        </div>
        <span class="num cur" id="scoreNum">00000</span>
    </div>
    <div id="canvasWrap">
        <canvas id="c" width="820" height="310"></canvas>
    </div>
</div>
<button id="jumpBtn">⬆ JUMP</button>
<script>
const c   = document.getElementById('c');
const ctx = c.getContext('2d');
const W = c.width, H = c.height;
const GROUND = 222;

const scoreEl  = document.getElementById('scoreNum');
const hiEl     = document.getElementById('hiNum');
const heartEls = [0,1,2].map(i=>document.getElementById('h'+i));
const jumpBtn  = document.getElementById('jumpBtn');
const hud      = document.getElementById('hud');
const canvasWrap = document.getElementById('canvasWrap');

// ── Responsive layout ────────────────────────────────────────────────────────
function applyLayout(){
    const sw=window.innerWidth, sh=window.innerHeight;
    const isPortrait=sh>sw, isMobile=('ontouchstart' in window)||(navigator.maxTouchPoints>0);
    if(isPortrait&&isMobile){
        const scale=sw/H, displayH=W*scale;
        c.style.width=W+'px'; c.style.height=H+'px';
        c.style.transform=`rotate(90deg) scale(${scale})`; c.style.transformOrigin='center center';
        canvasWrap.style.width=sw+'px'; canvasWrap.style.height=displayH+'px'; canvasWrap.style.overflow='hidden';
        hud.style.display='none';
        jumpBtn.style.width=(sw-32)+'px'; jumpBtn.style.marginLeft='16px'; jumpBtn.style.height='72px'; jumpBtn.style.fontSize='22px';
        document.querySelector('.wrap').style.padding='0'; document.querySelector('.wrap').style.maxWidth='100vw';
    } else {
        const maxW=Math.min(sw-16,820);
        c.style.width=maxW+'px'; c.style.height='auto'; c.style.transform=''; c.style.transformOrigin='';
        canvasWrap.style.width='100%'; canvasWrap.style.height='auto'; canvasWrap.style.overflow='visible';
        hud.style.display=''; document.querySelector('.wrap').style.padding='0 8px'; document.querySelector('.wrap').style.maxWidth='820px';
    }
}
applyLayout();
window.addEventListener('resize',applyLayout);
window.addEventListener('orientationchange',()=>setTimeout(applyLayout,200));

let isMobilePortrait=false;
function checkMobile(){ isMobilePortrait=window.innerHeight>window.innerWidth&&('ontouchstart' in window||navigator.maxTouchPoints>0); }
checkMobile(); window.addEventListener('resize',checkMobile);

// ── BG theme keyframes: score 0→100→200→300→400→500 ─────────────────────────
// Each theme: skyTop, skyBot, mtn1, mtn2, gndTop, gndLine, dirtTop, dirtBot
const THEMES = [
    // spring
    { skyT:'#3b82f6',skyB:'#bae6fd', m1:'#93c5fd',m2:'#6ee7b7', gT:'#4ade80',gL:'#16a34a',dT:'#a16207',dB:'#78350f', hasSun:true,  sunC:'#fef08a',sunG:'#fde047', hasStars:false, hasNight:false },
    // beach
    { skyT:'#f97316',skyB:'#fde68a', m1:'#fed7aa',m2:'#fde68a', gT:'#fde68a',gL:'#fcd34d',dT:'#0ea5e9',dB:'#0369a1', hasSun:true,  sunC:'#fde047',sunG:'#f59e0b', hasStars:false, hasNight:false },
    // autumn
    { skyT:'#7c2d12',skyB:'#f97316', m1:'#c2410c',m2:'#78350f', gT:'#92400e',gL:'#78350f',dT:'#451a03',dB:'#1c0a00', hasSun:true,  sunC:'#fb923c',sunG:'#f97316', hasStars:false, hasNight:false },
    // winter
    { skyT:'#94a3b8',skyB:'#e2e8f0', m1:'#94a3b8',m2:'#cbd5e1', gT:'#e2e8f0',gL:'#f1f5f9',dT:'#cbd5e1',dB:'#94a3b8', hasSun:true,  sunC:'#e2e8f0',sunG:'#cbd5e1', hasStars:false, hasNight:false },
    // night
    { skyT:'#0f172a',skyB:'#1e1b4b', m1:'#1e1b4b',m2:'#0f172a', gT:'#14532d',gL:'#166534',dT:'#1c1917',dB:'#0c0a09', hasSun:false, sunC:'#e0e7ff',sunG:'#c7d2fe', hasStars:true,  hasNight:true  },
    // space
    { skyT:'#020617',skyB:'#0a0a2e', m1:'#1e1b4b',m2:'#0a0a2e', gT:'#312e81',gL:'#4c1d95',dT:'#0a0a2e',dB:'#020617', hasSun:false, sunC:'',       sunG:'',        hasStars:true,  hasNight:false },
];

// Lerp a hex color
function lerpHex(a,b,t){
    const ah=parseInt(a.slice(1),16),bh=parseInt(b.slice(1),16);
    const ar=(ah>>16)&255,ag=(ah>>8)&255,ab=ah&255;
    const br=(bh>>16)&255,bg=(bh>>8)&255,bb=bh&255;
    return '#'+[ar+(br-ar)*t,ag+(bg-ag)*t,ab+(bb-ab)*t].map(v=>Math.round(v).toString(16).padStart(2,'0')).join('');
}
function lerpTheme(score){
    // score 0..500+ mapped to 0..5
    const maxScore=500;
    const t=Math.min(score,maxScore)/maxScore * (THEMES.length-1);
    const i=Math.min(Math.floor(t), THEMES.length-2);
    const f=t-i;
    const A=THEMES[i], B=THEMES[i+1];
    return {
        skyT:lerpHex(A.skyT,B.skyT,f), skyB:lerpHex(A.skyB,B.skyB,f),
        m1:lerpHex(A.m1,B.m1,f),       m2:lerpHex(A.m2,B.m2,f),
        gT:lerpHex(A.gT,B.gT,f),       gL:lerpHex(A.gL,B.gL,f),
        dT:lerpHex(A.dT,B.dT,f),       dB:lerpHex(A.dB,B.dB,f),
        hasSun: f<0.5 ? A.hasSun : B.hasSun,
        sunC: f<0.5 ? A.sunC : B.sunC,
        sunG: f<0.5 ? A.sunG : B.sunG,
        starAlpha: f<0.5 ? (A.hasStars?1:0)*f*2 : (B.hasStars?1:(1-f)*2),
        nightGnd: f<0.5 ? A.hasNight : B.hasNight,
        isSpace: t>=4.5,
        isBeach: t>=0.5&&t<1.5,
        isWinter: t>=2.5&&t<3.5,
        isAutumn: t>=1.5&&t<2.5,
        rawT: t,
    };
}

// ── Obstacle palettes — color also lerps with theme ──────────────────────────
const OBS_SETS = [
    [{body:'#16a34a',dark:'#166534',light:'#bbf7d0',spike:'#14532d'},{body:'#7c3aed',dark:'#4c1d95',light:'#ddd6fe',spike:'#3b0764'},{body:'#dc2626',dark:'#991b1b',light:'#fecaca',spike:'#7f1d1d'}],
    [{body:'#b45309',dark:'#92400e',light:'#fef08a',spike:'#78350f'},{body:'#0369a1',dark:'#075985',light:'#bae6fd',spike:'#0c4a6e'},{body:'#d97706',dark:'#92400e',light:'#fde68a',spike:'#b45309'}],
    [{body:'#b45309',dark:'#78350f',light:'#fed7aa',spike:'#92400e'},{body:'#dc2626',dark:'#991b1b',light:'#fecaca',spike:'#7f1d1d'},{body:'#a16207',dark:'#713f12',light:'#fef08a',spike:'#854d0e'}],
    [{body:'#0369a1',dark:'#075985',light:'#e0f2fe',spike:'#0c4a6e'},{body:'#6b7280',dark:'#374151',light:'#f1f5f9',spike:'#9ca3af'},{body:'#7c3aed',dark:'#4c1d95',light:'#ddd6fe',spike:'#3b0764'}],
    [{body:'#1e3a5f',dark:'#0c2240',light:'#60a5fa',spike:'#1e40af'},{body:'#4c1d95',dark:'#2e1065',light:'#c4b5fd',spike:'#6d28d9'},{body:'#065f46',dark:'#022c22',light:'#6ee7b7',spike:'#047857'}],
    [{body:'#6b7280',dark:'#374151',light:'#d1d5db',spike:'#9ca3af'},{body:'#7c3aed',dark:'#4c1d95',light:'#c4b5fd',spike:'#5b21b6'},{body:'#0e7490',dark:'#164e63',light:'#67e8f9',spike:'#0891b2'}],
];
function getObsPalette(score){
    const t=Math.min(score,500)/500*(OBS_SETS.length-1);
    return OBS_SETS[Math.min(Math.floor(t+0.5), OBS_SETS.length-1)];
}

const WARN_MSGS={2:'HATI-HATI LAH MON',1:'WOI HATI-HATI MON',0:'WOI DARAH LO TINGGAL 1 MON'};

const simonImg=new Image(); simonImg.crossOrigin='anonymous';
simonImg.src='https://i.ibb.co/rRfhtkDK/image-1.png';

let state='idle', score=0, hi=0, lives=3;
let speed=7, gameTimer=0, frame=0;
let obstacles=[], clouds=[], birds=[], dust=[], popups=[];
let groundX=0, mountainX=0, hiFlash=0, invincible=0, warnMsg=null;
let stars=[], nebulas=[], snowflakes=[], leaves=[], waveX=0;
let abducting=false, abductTimer=0, ufoY=-140, ufoBeamAlpha=0, simonLiftY=0, abductDone=false;

const R={x:85,y:GROUND,w:62,h:62,dy:0,jumps:0,maxJumps:2,grounded:true,sqY:1,sqV:0,roll:0,rollTarget:0,rolling:false,trail:[]};

// scene particles — persistent, color/type shifts with theme
function initScene(){
    clouds=[]; birds=[]; stars=[]; snowflakes=[]; nebulas=[]; leaves=[];
    for(let i=0;i<80;i++) stars.push({x:Math.random()*W,y:Math.random()*(GROUND+62),r:Math.random()*2+.2,tw:Math.random()*Math.PI*2,spd:Math.random()*.04+.01,color:['#fff','#a78bfa','#67e8f9','#fde68a'][Math.random()*4|0]});
    for(let i=0;i<80;i++) snowflakes.push({x:Math.random()*W,y:Math.random()*GROUND,r:1+Math.random()*3,spd:.5+Math.random()*1.5,drift:Math.random()*.6-.3,phase:Math.random()*Math.PI*2});
    for(let i=0;i<30;i++) leaves.push(mkLeaf(true));
    for(let i=0;i<5;i++) nebulas.push({x:Math.random()*W,y:Math.random()*(GROUND+60),r:40+Math.random()*80,color:['rgba(139,92,246,.12)','rgba(6,182,212,.1)','rgba(99,102,241,.1)','rgba(244,114,182,.09)'][Math.random()*4|0]});
    for(let i=0;i<5;i++) spawnCloud(true);
    for(let i=0;i<4;i++) birds.push({x:Math.random()*W,y:28+Math.random()*85,spd:.9+Math.random()*1.3,phase:Math.random()*Math.PI*2,sz:3+Math.random()*3});
}
function mkLeaf(init){ return {x:init?Math.random()*W:W+10,y:init?Math.random()*GROUND:-10,vx:-(1+Math.random()*2),vy:.5+Math.random(),phase:Math.random()*Math.PI*2,size:6+Math.random()*8,color:['#f97316','#dc2626','#b45309','#fbbf24','#ea580c'][Math.random()*5|0]}; }
function spawnCloud(init){ const sz=.5+Math.random()*.9; clouds.push({x:init?Math.random()*W:W+40+Math.random()*200,y:15+Math.random()*80,w:100*sz,h:38*sz,spd:.4+Math.random()*.6}); }

function action(){
    if(abducting) return;
    if(state!=='running'){ startGame(); return; }
    if(R.jumps<R.maxJumps){
        R.dy=-16; R.grounded=false; R.jumps++;
        R.sqY=.55; R.sqV=.12;
        R.rollTarget=Math.round(R.roll/(Math.PI*2))*Math.PI*2+Math.PI*2;
        R.rolling=true;
        spawnDust(R.x+R.w/2,R.y+R.h,'#86efac',10);
    }
}
document.addEventListener('keydown',e=>{ if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();action();} });
c.addEventListener('click',action);
c.addEventListener('touchstart',e=>{e.preventDefault();action();},{passive:false});
jumpBtn.addEventListener('touchstart',e=>{e.preventDefault();action();},{passive:false});
jumpBtn.addEventListener('click',action);

function startGame(){
    score=0; speed=7; gameTimer=0; frame=0;
    obstacles=[]; dust=[]; popups=[]; warnMsg=null;
    lives=3; invincible=0; updateHearts();
    R.y=GROUND; R.dy=0; R.jumps=0; R.grounded=true;
    R.sqY=1; R.sqV=0; R.roll=0; R.rollTarget=0; R.rolling=false; R.trail=[];
    abducting=false; abductTimer=0; ufoY=-140; ufoBeamAlpha=0; simonLiftY=0; abductDone=false;
    scoreEl.textContent='00000'; hiEl.textContent=hi.toString().padStart(5,'0');
    state='running';
}
function updateHearts(){ heartEls.forEach((h,i)=>h.className='heart'+(i>=lives?' lost':'')); }
function showWarning(l){ const m=WARN_MSGS[l]; if(m) warnMsg={text:m,life:1.0}; }
function spawnDust(x,y,color,n){ for(let i=0;i<n;i++) dust.push({x:x+(Math.random()-.5)*24,y,vx:(Math.random()-.5)*3,vy:-Math.random()*3-.5,life:1,r:3+Math.random()*5,color}); }

function spawnObstacle(){
    const pals=getObsPalette(score), pal=pals[Math.random()*pals.length|0];
    const shapes=[{w:22,h:52},{w:22,h:72},{w:22,h:90},{w:44,h:52},{w:44,h:72}];
    const s=shapes[Math.random()*shapes.length|0], count=score>30&&Math.random()>.58?2:1;
    let ox=W+30;
    const th=lerpTheme(score);
    for(let i=0;i<count;i++){ obstacles.push({x:ox,y:GROUND+R.h-s.h,w:s.w,h:s.h,scored:false,pal,isAsteroid:th.isSpace}); ox+=s.w+20; }
}
function hit(o){ const px=14,pt=10; return R.x+px<o.x+o.w&&R.x+R.w-px>o.x&&R.y+pt<o.y+o.h&&R.y+R.h-5>o.y; }

function startAbduction(){ abducting=true; abductTimer=0; ufoY=-140; ufoBeamAlpha=0; simonLiftY=0; }
function tickAbduction(){
    abductTimer++;
    if(abductTimer<80) ufoY=-140+(abductTimer/80)*(GROUND-80+140);
    if(abductTimer>=80&&abductTimer<140) ufoBeamAlpha=(abductTimer-80)/60;
    if(abductTimer>=140&&abductTimer<230) simonLiftY=((abductTimer-140)/90)*(ufoY+90-GROUND);
    if(abductTimer>=230&&abductTimer<290){ ufoY-=6; simonLiftY=ufoY+90-GROUND; }
    if(abductTimer>=290&&!abductDone){
        abductDone=true; abducting=false;
        R.y=GROUND; R.dy=0; simonLiftY=0; R.jumps=0; R.grounded=true;
    }
}

// ── DRAW ─────────────────────────────────────────────────────────────────────
function drawBg(th){
    // Sky
    const g=ctx.createLinearGradient(0,0,0,GROUND+R.h);
    g.addColorStop(0,th.skyT); g.addColorStop(1,th.skyB);
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

    // Stars — fade in for night/space
    if(th.starAlpha>0||th.rawT>=3.5){
        const sa=Math.min(1,th.rawT>=4?(th.rawT-4)*2:Math.max(0,(th.rawT-3)*2));
        stars.forEach(s=>{
            s.tw+=s.spd; if(state==='running') s.x-=speed*(th.isSpace?.08:.03); if(s.x<0) s.x=W+5;
            ctx.fillStyle=s.color||'#fff'; ctx.globalAlpha=sa*Math.max(.1,.3+Math.sin(s.tw)*.6);
            ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
        });
        ctx.globalAlpha=1;
    }

    // Nebulas (space)
    if(th.isSpace){
        nebulas.forEach(n=>{ if(state==='running') n.x-=speed*.04; if(n.x+n.r<0){n.x=W+n.r;n.y=Math.random()*(GROUND+60);}
            ctx.fillStyle=n.color; ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2); ctx.fill(); });
    }

    // Sun / Moon
    if(th.hasSun){
        ctx.shadowColor=th.sunG; ctx.shadowBlur=30; ctx.fillStyle=th.sunC;
        ctx.beginPath(); ctx.arc(W-76,52,32,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
        ctx.strokeStyle=th.sunG+'66'; ctx.lineWidth=2;
        for(let a=0;a<8;a++){ const ang=a*Math.PI/4+frame*.004; ctx.beginPath(); ctx.moveTo(W-76+Math.cos(ang)*40,52+Math.sin(ang)*40); ctx.lineTo(W-76+Math.cos(ang)*56,52+Math.sin(ang)*56); ctx.stroke(); }
    } else if(th.hasNight){
        ctx.shadowColor='#e0e7ff'; ctx.shadowBlur=22; ctx.fillStyle='#e0e7ff';
        ctx.beginPath(); ctx.arc(W-76,52,28,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='rgba(100,116,139,.35)'; ctx.beginPath(); ctx.arc(W-62,44,18,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0;
    }

    // Mountains
    ctx.fillStyle=th.m1;
    const m1=mountainX%260;
    for(let x=-m1-260;x<W+260;x+=260){
        ctx.beginPath(); ctx.moveTo(x,GROUND+R.h); ctx.lineTo(x+60,GROUND+R.h-90); ctx.lineTo(x+130,GROUND+R.h-52); ctx.lineTo(x+200,GROUND+R.h-105); ctx.lineTo(x+260,GROUND+R.h); ctx.closePath(); ctx.fill();
        // Snow caps for winter-ish
        if(th.rawT>2.2&&th.rawT<4.2){
            const a=Math.min(1,Math.min(th.rawT-2.2,4.2-th.rawT)*2);
            ctx.fillStyle=`rgba(255,255,255,${a*.55})`;
            ctx.beginPath(); ctx.moveTo(x+186,GROUND+R.h-80); ctx.lineTo(x+200,GROUND+R.h-105); ctx.lineTo(x+214,GROUND+R.h-80); ctx.closePath(); ctx.fill();
            ctx.fillStyle=th.m1;
        }
    }
    ctx.fillStyle=th.m2;
    const m2=(mountainX*1.7)%340;
    for(let x=-m2-340;x<W+340;x+=340){
        ctx.beginPath(); ctx.moveTo(x,GROUND+R.h);
        ctx.bezierCurveTo(x+60,GROUND+R.h,x+70,GROUND+R.h-65,x+120,GROUND+R.h-65);
        ctx.bezierCurveTo(x+170,GROUND+R.h-65,x+180,GROUND+R.h-40,x+230,GROUND+R.h-40);
        ctx.bezierCurveTo(x+280,GROUND+R.h-40,x+290,GROUND+R.h-75,x+340,GROUND+R.h-75);
        ctx.lineTo(x+340,GROUND+R.h); ctx.closePath(); ctx.fill();
    }

    // Ground
    if(th.isSpace){
        ctx.fillStyle='#1e1b4b'; ctx.fillRect(0,GROUND+R.h,W,16);
        ctx.fillStyle='#4c1d95'; ctx.fillRect(0,GROUND+R.h,W,4);
        const eg=ctx.createLinearGradient(0,GROUND+R.h,0,GROUND+R.h+16); eg.addColorStop(0,'rgba(139,92,246,.5)'); eg.addColorStop(1,'transparent');
        ctx.fillStyle=eg; ctx.fillRect(0,GROUND+R.h,W,16);
        ctx.strokeStyle='rgba(139,92,246,.2)'; ctx.lineWidth=1;
        const go=groundX%60; for(let x=-go;x<W+10;x+=60){ ctx.beginPath(); ctx.moveTo(x,GROUND+R.h); ctx.lineTo(x,GROUND+R.h+16); ctx.stroke(); }
        const dg=ctx.createLinearGradient(0,GROUND+R.h+16,0,H); dg.addColorStop(0,'#0a0a2e'); dg.addColorStop(1,'#020617');
        ctx.fillStyle=dg; ctx.fillRect(0,GROUND+R.h+16,W,H);
        ctx.fillStyle='rgba(99,102,241,.12)'; ctx.beginPath(); ctx.arc(120,H-40,35,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='rgba(244,114,182,.09)'; ctx.beginPath(); ctx.arc(640,H-55,50,0,Math.PI*2); ctx.fill();
    } else if(th.isBeach){
        ctx.fillStyle=th.gT; ctx.fillRect(0,GROUND+R.h-4,W,8);
        ctx.fillStyle=th.gL; ctx.fillRect(0,GROUND+R.h-4,W,3);
        ctx.fillStyle='#0ea5e9'; ctx.fillRect(0,GROUND+R.h+4,W,H);
        ctx.fillStyle='rgba(56,189,248,.55)';
        const woff=(waveX)%80;
        for(let wx=-woff;wx<W+80;wx+=80){ ctx.beginPath(); ctx.moveTo(wx,GROUND+R.h+5); ctx.quadraticCurveTo(wx+20,GROUND+R.h,wx+40,GROUND+R.h+5); ctx.quadraticCurveTo(wx+60,GROUND+R.h+10,wx+80,GROUND+R.h+5); ctx.lineTo(wx+80,GROUND+R.h+16); ctx.lineTo(wx,GROUND+R.h+16); ctx.fill(); }
    } else {
        ctx.fillStyle=th.gT; ctx.fillRect(0,GROUND+R.h,W,14);
        ctx.fillStyle=th.gL; ctx.fillRect(0,GROUND+R.h,W,3);
        const dg=ctx.createLinearGradient(0,GROUND+R.h+14,0,H); dg.addColorStop(0,th.dT); dg.addColorStop(1,th.dB);
        ctx.fillStyle=dg; ctx.fillRect(0,GROUND+R.h+14,W,H);

        // Ground detail — grass tufts (fade out for winter/night)
        const gAlpha = th.rawT<2 ? 1 : th.rawT<3 ? 1-(th.rawT-2) : th.rawT>=4 ? 0 : 0;
        if(gAlpha>0){
            ctx.globalAlpha=gAlpha; ctx.fillStyle=th.rawT<2?'#22c55e':'#f97316';
            const off=groundX%70;
            for(let x=-off;x<W+20;x+=70){ ctx.beginPath(); ctx.moveTo(x+4,GROUND+R.h); ctx.lineTo(x+10,GROUND+R.h-10); ctx.lineTo(x+16,GROUND+R.h); ctx.fill(); ctx.beginPath(); ctx.moveTo(x+44,GROUND+R.h); ctx.lineTo(x+50,GROUND+R.h-7); ctx.lineTo(x+56,GROUND+R.h); ctx.fill(); }
            ctx.globalAlpha=1;
        }
        // Snow bumps for winter
        if(th.isWinter){
            ctx.fillStyle='#f8fafc'; const off=groundX%90;
            for(let x=-off;x<W+20;x+=90){ ctx.beginPath(); ctx.ellipse(x+30,GROUND+R.h+2,28,8,0,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.ellipse(x+75,GROUND+R.h+3,18,6,0,0,Math.PI*2); ctx.fill(); }
        }
    }
}

function drawClouds(th){
    if(th.isSpace) return;
    const nightAlpha = th.rawT>3.5 ? Math.max(0,1-(th.rawT-3.5)*2) : 1;
    for(let i=clouds.length-1;i>=0;i--){
        if(state==='running') clouds[i].x-=clouds[i].spd*(speed/7);
        if(clouds[i].x+clouds[i].w<0){ clouds.splice(i,1); spawnCloud(false); continue; }
        const cl=clouds[i];
        const hue=th.rawT<1?205:th.rawT<2?35:th.rawT<3?30:200;
        const sat=th.rawT>3?40:75, lit=th.rawT>3?55:93;
        const alpha=(th.rawT>3?0.2:0.82)*nightAlpha;
        ctx.fillStyle=`hsla(${hue},${sat}%,${lit}%,${alpha})`;
        ctx.beginPath();
        ctx.arc(cl.x+cl.w*.22,cl.y+cl.h*.65,cl.w*.2,0,Math.PI*2);
        ctx.arc(cl.x+cl.w*.5,cl.y+cl.h*.3,cl.w*.28,0,Math.PI*2);
        ctx.arc(cl.x+cl.w*.78,cl.y+cl.h*.65,cl.w*.18,0,Math.PI*2);
        ctx.rect(cl.x+cl.w*.05,cl.y+cl.h*.5,cl.w*.9,cl.h*.6);
        ctx.fill();
    }
}

function drawBirds(th){
    if(th.rawT>4||th.isSpace) return;
    const bAlpha=th.rawT>3?Math.max(0,1-(th.rawT-3)):1;
    ctx.globalAlpha=bAlpha;
    birds.forEach(b=>{ if(state==='running') b.x-=b.spd*(speed/7); if(b.x+20<0){b.x=W+80+Math.random()*200;b.y=28+Math.random()*85;} b.phase+=.13; const flap=Math.sin(b.phase)*b.sz*.85; ctx.strokeStyle='rgba(30,58,95,.7)'; ctx.lineWidth=1.8; ctx.beginPath(); ctx.moveTo(b.x-b.sz,b.y); ctx.quadraticCurveTo(b.x-b.sz*.4,b.y-flap,b.x,b.y); ctx.quadraticCurveTo(b.x+b.sz*.4,b.y-flap,b.x+b.sz,b.y); ctx.stroke(); });
    ctx.globalAlpha=1;
}

function drawSnow(th){
    if(!th.isWinter) return;
    snowflakes.forEach(s=>{ s.y+=s.spd; s.x+=s.drift+Math.sin(s.phase+frame*.03)*.4; if(s.y>GROUND+R.h+10){s.y=0;s.x=Math.random()*W;} if(s.x>W)s.x=0; if(s.x<0)s.x=W; ctx.fillStyle='rgba(255,255,255,.8)'; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill(); });
}

function drawLeafParticles(th){
    if(!th.isAutumn) return;
    leaves.forEach((l,i)=>{ l.x+=l.vx; l.y+=l.vy; l.vy+=.04; l.phase+=.06; l.x+=Math.sin(l.phase)*.5; if(l.y>GROUND+R.h||l.x<-20){leaves[i]=mkLeaf(false);return;} ctx.fillStyle=l.color; ctx.save(); ctx.translate(l.x,l.y); ctx.rotate(l.phase*.5); ctx.beginPath(); ctx.ellipse(0,0,l.size,l.size*.5,0,0,Math.PI*2); ctx.fill(); ctx.restore(); });
}

function drawObstacle(o){
    if(o.isAsteroid){
        const p=o.pal,cx2=o.x+o.w/2,cy2=o.y+o.h/2;
        ctx.shadowColor=p.light; ctx.shadowBlur=10; ctx.fillStyle=p.body;
        ctx.beginPath(); const pts=7,br=Math.min(o.w,o.h)/2;
        for(let i=0;i<pts;i++){ const ang=i/pts*Math.PI*2,r=br*(.7+Math.sin(ang*3+o.x)*.3); i===0?ctx.moveTo(cx2+Math.cos(ang)*r,cy2+Math.sin(ang)*r):ctx.lineTo(cx2+Math.cos(ang)*r,cy2+Math.sin(ang)*r); }
        ctx.closePath(); ctx.fill(); ctx.shadowBlur=0;
        ctx.fillStyle=p.light+'44'; ctx.beginPath(); ctx.ellipse(cx2-br*.2,cy2-br*.2,br*.3,br*.2,-.5,0,Math.PI*2); ctx.fill(); return;
    }
    const p=o.pal,cx2=o.x+o.w/2;
    ctx.fillStyle='rgba(0,0,0,.12)'; ctx.beginPath(); ctx.ellipse(cx2,GROUND+R.h+4,o.w*.65,5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=p.body; ctx.beginPath(); ctx.roundRect(cx2-5,o.y,10,o.h,3); ctx.fill();
    ctx.fillStyle=p.light+'88'; ctx.fillRect(cx2-2,o.y+5,3,o.h-10);
    if(o.h>=55){ const ay=o.y+o.h*.3; ctx.fillStyle=p.body; ctx.beginPath(); ctx.roundRect(o.x,ay,o.w*.4-4,8,3); ctx.fill(); ctx.beginPath(); ctx.roundRect(o.x,ay-22,8,24,3); ctx.fill(); ctx.beginPath(); ctx.roundRect(cx2+5,ay,o.w*.4-4,8,3); ctx.fill(); ctx.beginPath(); ctx.roundRect(o.x+o.w-8,ay-18,8,20,3); ctx.fill(); ctx.fillStyle=p.light+'66'; ctx.fillRect(o.x+2,ay-20,3,18); ctx.fillRect(o.x+o.w-6,ay-16,3,14); }
    ctx.fillStyle=p.spike; for(let sy=o.y+10;sy<o.y+o.h-8;sy+=15){ ctx.beginPath(); ctx.moveTo(cx2-5,sy); ctx.lineTo(cx2-13,sy+5); ctx.lineTo(cx2-5,sy+6); ctx.fill(); ctx.beginPath(); ctx.moveTo(cx2+5,sy); ctx.lineTo(cx2+13,sy+5); ctx.lineTo(cx2+5,sy+6); ctx.fill(); }
}

function drawSimon(overrideY){
    const ry=overrideY!==undefined?overrideY:R.y; const dist=GROUND-(ry+R.h);
    if(dist>-5){ const sa=Math.max(0,1-dist/160)*.3,sr=(R.w/2)*(.7+.3*(1-Math.min(1,dist/150))); ctx.fillStyle=`rgba(0,0,0,${sa})`; ctx.beginPath(); ctx.ellipse(R.x+R.w/2,GROUND+R.h+2,sr,5,0,0,Math.PI*2); ctx.fill(); }
    if(invincible>0&&Math.floor(invincible/4)%2===1) ctx.globalAlpha=.35;
    R.trail.forEach((t,i)=>{ ctx.globalAlpha=(i/R.trail.length)*.13; ctx.save(); ctx.translate(t.x+R.w/2,t.y+R.h/2); ctx.rotate(t.roll); if(simonImg.complete&&simonImg.naturalWidth>0) ctx.drawImage(simonImg,-R.w/2,-R.h/2,R.w,R.h); ctx.restore(); });
    ctx.globalAlpha=(invincible>0&&Math.floor(invincible/4)%2===1)?.35:1;
    ctx.save(); ctx.translate(R.x+R.w/2,ry+R.h/2); ctx.rotate(R.roll); ctx.scale(1+(1-R.sqY)*.35,R.sqY);
    if(simonImg.complete&&simonImg.naturalWidth>0) ctx.drawImage(simonImg,-R.w/2,-R.h/2,R.w,R.h);
    else{ ctx.fillStyle='#334155'; ctx.beginPath(); ctx.roundRect(-R.w/2,-R.h/2,R.w,R.h,6); ctx.fill(); }
    ctx.restore(); ctx.globalAlpha=1;
}
function drawUFO(ux,uy){ ctx.shadowColor='#34d399'; ctx.shadowBlur=30; ctx.fillStyle='#9ca3af'; ctx.beginPath(); ctx.ellipse(ux,uy+12,60,18,0,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#d1fae5'; ctx.beginPath(); ctx.ellipse(ux,uy,28,20,0,Math.PI,Math.PI*2); ctx.fill(); ctx.fillStyle='rgba(52,211,153,.35)'; ctx.beginPath(); ctx.ellipse(ux,uy,28,20,0,Math.PI,Math.PI*2); ctx.fill(); ['#f87171','#fbbf24','#34d399','#60a5fa'].forEach((lc,i)=>{ ctx.fillStyle=lc; ctx.beginPath(); ctx.arc(ux-45+i*30,uy+18,5,0,Math.PI*2); ctx.fill(); }); ctx.shadowBlur=0; }
function drawBeam(ux,uy){ if(ufoBeamAlpha<=0) return; const g=ctx.createLinearGradient(0,uy+20,0,GROUND+62); g.addColorStop(0,`rgba(52,211,153,${ufoBeamAlpha*.5})`); g.addColorStop(1,'rgba(52,211,153,0)'); ctx.fillStyle=g; ctx.beginPath(); ctx.moveTo(ux-30,uy+20); ctx.lineTo(ux-55,GROUND+62); ctx.lineTo(ux+55,GROUND+62); ctx.lineTo(ux+30,uy+20); ctx.closePath(); ctx.fill(); }
function drawDust(){ dust.forEach(p=>{ ctx.fillStyle=p.color+Math.floor(p.life*200).toString(16).padStart(2,'0'); ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill(); }); }
function drawPopups(){ popups.forEach(p=>{ ctx.globalAlpha=p.life; ctx.fillStyle='#22c55e'; ctx.font='bold 15px "Courier New"'; ctx.textAlign='center'; ctx.fillText('+'+p.val,p.x,p.y); }); ctx.globalAlpha=1; ctx.textAlign='left'; }
function drawWarnMsg(){
    if(!warnMsg) return; const l=warnMsg.life,sc=l>.8?.5+(1-l)/.2*.6:l<.25?l/.25:1.1;
    ctx.save(); ctx.globalAlpha=Math.min(1,l*3); ctx.translate(W/2,H/2-20); ctx.scale(sc,sc);
    ctx.font='bold 20px "Courier New"'; const tw=ctx.measureText(warnMsg.text).width;
    ctx.fillStyle='rgba(220,38,38,.92)'; ctx.beginPath(); ctx.roundRect(-tw/2-24,-26,tw+48,52,14); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.7)'; ctx.lineWidth=2.5; ctx.stroke();
    ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(warnMsg.text,0,0);
    ctx.restore(); ctx.textAlign='left'; ctx.textBaseline='alphabetic'; ctx.globalAlpha=1;
}
function drawGameOver(){
    ctx.fillStyle='rgba(0,0,0,.55)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='rgba(15,23,42,.96)'; ctx.beginPath(); ctx.roundRect(W/2-210,H/2-70,420,155,18); ctx.fill();
    ctx.strokeStyle='#dc2626'; ctx.lineWidth=3; ctx.beginPath(); ctx.roundRect(W/2-210,H/2-70,420,155,18); ctx.stroke();
    ctx.fillStyle='#dc2626'; ctx.font='bold 30px "Courier New"'; ctx.textAlign='center'; ctx.fillText('MATI LO MON! 💀',W/2,H/2-24);
    ctx.fillStyle='#94a3b8'; ctx.font='13px "Courier New"'; ctx.fillText('SCORE: '+score.toString().padStart(5,'0')+'   BEST: '+hi.toString().padStart(5,'0'),W/2,H/2+10);
    ctx.fillStyle='#dc2626'; ctx.beginPath(); ctx.roundRect(W/2-62,H/2+28,124,40,10); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 14px "Courier New"'; ctx.fillText('▶  RESTART',W/2,H/2+53); ctx.textAlign='left';
}
function drawIdleText(){
    ctx.fillStyle='rgba(15,23,42,.9)'; ctx.beginPath(); ctx.roundRect(W/2-220,H/2-28,440,56,12); ctx.fill();
    ctx.fillStyle='#60a5fa'; ctx.font='bold 14px "Courier New"'; ctx.textAlign='center'; ctx.fillText('TAP  TO  START',W/2,H/2+7); ctx.textAlign='left';
}
function drawMobileHUD(){
    if(!isMobilePortrait) return;
    ctx.fillStyle='rgba(0,0,0,.45)'; ctx.beginPath(); ctx.roundRect(W-160,8,152,36,8); ctx.fill();
    ctx.fillStyle='#e2e8f0'; ctx.font='bold 20px "Courier New"'; ctx.textAlign='right'; ctx.fillText(score.toString().padStart(5,'0'),W-12,32);
    ctx.fillStyle='rgba(0,0,0,.45)'; ctx.beginPath(); ctx.roundRect(8,8,160,36,8); ctx.fill();
    ctx.fillStyle='#94a3b8'; ctx.font='bold 11px "Courier New"'; ctx.textAlign='left'; ctx.fillText('HI  '+hi.toString().padStart(5,'0'),16,32);
    ctx.font='16px sans-serif';
    for(let i=0;i<3;i++){ ctx.globalAlpha=i<lives?1:.2; ctx.fillText('❤️',W/2-26+i*26,32); }
    ctx.globalAlpha=1; ctx.textAlign='left';
}

initScene();

function loop(){
    frame++;
    const th = lerpTheme(score);

    drawBg(th);
    drawSnow(th);
    drawLeafParticles(th);
    drawClouds(th);
    drawBirds(th);
    obstacles.forEach(o=>drawObstacle(o));
    drawDust();

    if(abducting){
        drawBeam(R.x+R.w/2,ufoY); drawUFO(R.x+R.w/2,ufoY);
        drawSimon(R.y+simonLiftY); tickAbduction();
        if(abductTimer>80&&abductTimer<230&&Math.floor(abductTimer/8)%2===0){ ctx.fillStyle='rgba(52,211,153,.95)'; ctx.font='bold 18px "Courier New"'; ctx.textAlign='center'; ctx.fillText('SIMON DI CULIK ALIEN!! 👽',W/2,H/2+40); ctx.textAlign='left'; }
    } else { drawSimon(); }

    if(invincible>105){ ctx.fillStyle=`rgba(239,68,68,${(invincible-105)/15*.28})`; ctx.fillRect(0,0,W,H); }
    drawPopups(); drawWarnMsg();
    drawMobileHUD();

    if(state==='running'&&!abducting){
        gameTimer++; groundX+=speed; mountainX+=speed*.13; waveX+=.8;
        R.dy+=.82; R.y+=R.dy;
        if(R.rolling){ const rem=R.rollTarget-R.roll; if(rem>.01){R.roll+=Math.max(.04,rem*.10);if(R.roll>=R.rollTarget)R.roll=R.rollTarget;} }
        R.sqY+=R.sqV; R.sqV+=(1-R.sqY)*.28; R.sqV*=.62; if(R.sqY>1.35)R.sqY=1.35; if(R.sqY<.5)R.sqY=.5;
        if(!R.grounded){R.trail.push({x:R.x,y:R.y,roll:R.roll});if(R.trail.length>5)R.trail.shift();} else if(R.trail.length>0)R.trail.shift();
        if(R.y>=GROUND){ const wa=!R.grounded; if(wa&&R.dy>3){R.sqY=1.28;R.sqV=-.09;spawnDust(R.x+R.w/2,GROUND+R.h,th.isSpace?'#a78bfa':th.isWinter?'#bae6fd':'#4ade80',8);} R.roll=Math.round(R.roll/(Math.PI*2))*Math.PI*2; R.rollTarget=R.roll; R.rolling=false; R.y=GROUND; R.dy=0; R.grounded=true; R.jumps=0; }
        for(let i=dust.length-1;i>=0;i--){const p=dust[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life-=.05;if(p.life<=0)dust.splice(i,1);}
        for(let i=popups.length-1;i>=0;i--){const p=popups[i];p.y-=1.2;p.life-=.03;if(p.life<=0)popups.splice(i,1);}
        if(warnMsg){warnMsg.life-=.012;if(warnMsg.life<=0)warnMsg=null;}
        if(invincible>0)invincible--;
        const interval=Math.max(38,88-score*.4); if(gameTimer%(interval|0)===0) spawnObstacle();
        speed=Math.min(22,7+score*.025);
        // Abduction at score 500
        if(score>=500&&!abductDone&&!abducting) startAbduction();
        for(let i=obstacles.length-1;i>=0;i--){
            const o=obstacles[i]; o.x-=speed;
            if(!o.scored&&o.x+o.w<R.x){ score+=10; o.scored=true; scoreEl.textContent=score.toString().padStart(5,'0'); popups.push({x:R.x+R.w/2,y:R.y-8,val:10,life:1}); }
            if(o.x+o.w<0){obstacles.splice(i,1);continue;}
            if(hit(o)&&invincible===0){ lives--; updateHearts(); invincible=120; spawnDust(R.x+R.w/2,R.y+R.h/2,'#ef4444',16); showWarning(lives); if(lives<=0){state='gameover';if(score>hi){hi=score;hiEl.textContent=hi.toString().padStart(5,'0');}}}
        }
    } else if(!abducting){
        for(let i=dust.length-1;i>=0;i--){const p=dust[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life-=.05;if(p.life<=0)dust.splice(i,1);}
        mountainX+=speed*.04; if(warnMsg){warnMsg.life-=.012;if(warnMsg.life<=0)warnMsg=null;}
    }
    if(hiFlash>0){hiFlash--;hiEl.style.color=hiFlash%6<3?'#60a5fa':'#94a3b8';}else hiEl.style.color='#94a3b8';
    if(state==='idle')     drawIdleText();
    if(state==='gameover') drawGameOver();
    requestAnimationFrame(loop);
}
loop();
</script>
